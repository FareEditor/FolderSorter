<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>Folder Sorter</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; outline: none; }
        
        html, body {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #222222; /* Родной цвет панели Adobe */
            font-family: "Adobe Clean", "Segoe UI", sans-serif; 
            user-select: none;
            cursor: default;
        }

        body {
            padding: 4px;
            display: flex;
            width: 100%;
            height: 100%;
        }

        .toolbar {
            display: grid;
            width: 100%;
            height: 100%;
            background-color: #1a1a1a;
            padding: 3px;
            border-radius: 6px;
            border: 1px solid #2d2d2d;
            grid-template-columns: repeat(auto-fit, minmax(28px, 1fr));
            grid-auto-rows: 1fr;
            gap: 4px;
        }

        .btn-action {
            background: transparent;
            border: none;
            color: #2d8ceb;
            width: 100%;
            height: 100%;
            font-size: 14px;
            border-radius: 4px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: background-color 0.15s ease, color 0.15s ease;
        }

        .btn-action:hover {
            background-color: #333333;
        }

        .btn-action:active {
            background-color: #111111;
        }

        .btn-secondary {
            color: #888888;
        }
        .btn-secondary:hover {
            color: #cccccc;
        }

        .btn-action.status-process { color: #f1c40f !important; }
        .btn-action.status-success { color: #2ecc71 !important; }
        .btn-action.status-error   { color: #e74c3c !important; }

    </style>
</head>
<body>

    <div class="toolbar">
        <button id="sortBtn" class="btn-action" title="Sort Files & Templates">
            <i class="fa-solid fa-folder-tree"></i>
        </button>

        <button id="codeBtn" class="btn-action btn-secondary" title="Source Code (v3)">
            <i class="fa-solid fa-code"></i>
        </button>
    </div>

    <script src="js/CSInterface.js"></script>
    <script src="js/main.js"></script>
</body>
</html>
