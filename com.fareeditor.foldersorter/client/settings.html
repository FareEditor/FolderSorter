<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Folder Sorter — Settings</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
    --bg:            #1e1e1e;
    --bg-panel:      #252525;
    --bg-item:       #2c2c2c;
    --bg-hover:      #333333;
    --bg-active:     rgba(45,140,235,0.18);
    --border:        #3a3a3a;
    --text:          #d4d4d4;
    --text-muted:    #787878;
    --accent:        #2d8ceb;
    --accent-hover:  #1a75d2;
    --danger:        #e74c3c;
    --chip-bg:       #383838;
    --chip-border:   #505050;
}

html, body {
    width: 100%; height: 100%;
    background: var(--bg);
    color: var(--text);
    font-family: "Adobe Clean", "Segoe UI", sans-serif;
    font-size: 12px;
    overflow: hidden;
    user-select: none;
}

/* ── Layout ─────────────────────────────────────── */
.layout { display: flex; flex-direction: column; height: 100%; }

/* ── Tabs ───────────────────────────────────────── */
.tabs {
    display: flex;
    background: var(--bg-panel);
    border-bottom: 1px solid var(--border);
    padding: 0 12px;
    flex-shrink: 0;
}
.tab {
    padding: 9px 16px;
    cursor: pointer;
    color: var(--text-muted);
    border-bottom: 2px solid transparent;
    margin-bottom: -1px;
    transition: color 0.12s;
    font-size: 12px;
}
.tab:hover { color: var(--text); }
.tab.active { color: var(--accent); border-bottom-color: var(--accent); }

/* ── Body ───────────────────────────────────────── */
.body { display: flex; flex: 1; overflow: hidden; }

/* ── Sidebar ────────────────────────────────────── */
.sidebar {
    width: 185px;
    flex-shrink: 0;
    background: var(--bg-panel);
    border-right: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    overflow: hidden;
}
.sidebar-list { flex: 1; overflow-y: auto; padding: 4px 0; }

.sidebar-item {
    display: flex;
    align-items: center;
    gap: 7px;
    padding: 7px 10px;
    cursor: pointer;
    border-left: 2px solid transparent;
    transition: background 0.1s;
}
.sidebar-item:hover { background: var(--bg-hover); }
.sidebar-item.active {
    background: var(--bg-active);
    border-left-color: var(--accent);
}
.sidebar-item-icon { color: var(--text-muted); font-size: 15px; flex-shrink: 0; }
.sidebar-item.templates-row .sidebar-item-icon { color: var(--accent); }
.sidebar-item-name {
    flex: 1; overflow: hidden;
    text-overflow: ellipsis; white-space: nowrap;
}
.sidebar-item-del {
    opacity: 0; cursor: pointer;
    color: var(--text-muted); font-size: 13px;
    line-height: 1; padding: 1px 3px; border-radius: 2px;
    flex-shrink: 0;
}
.sidebar-item:hover .sidebar-item-del { opacity: 1; }
.sidebar-item-del:hover { color: var(--danger); background: rgba(231,76,60,0.12); }

.sidebar-divider { height: 1px; background: var(--border); margin: 4px 0; }

.sidebar-add {
    display: flex; align-items: center; gap: 7px;
    padding: 8px 10px;
    cursor: pointer; color: var(--accent);
    border-top: 1px solid var(--border);
    font-size: 12px; flex-shrink: 0;
}
.sidebar-add:hover { background: var(--bg-hover); }

/* ── Detail panel ───────────────────────────────── */
.detail {
    flex: 1; overflow-y: auto;
    padding: 18px 20px;
    display: flex; flex-direction: column; gap: 18px;
}

.field-group { display: flex; flex-direction: column; gap: 7px; }
.field-label {
    font-size: 10px; font-weight: 600;
    color: var(--text-muted);
    text-transform: uppercase; letter-spacing: 0.6px;
}
.field-input {
    background: var(--bg-item);
    border: 1px solid var(--border);
    color: var(--text);
    padding: 6px 9px; border-radius: 3px;
    font-size: 12px; font-family: inherit;
    outline: none; width: 100%;
    transition: border-color 0.12s;
}
.field-input:focus { border-color: var(--accent); }

/* ── Chips ──────────────────────────────────────── */
.chips {
    display: flex; flex-wrap: wrap; gap: 5px;
    padding: 8px;
    background: var(--bg-item);
    border: 1px solid var(--border); border-radius: 3px;
    min-height: 38px; align-content: flex-start;
    transition: border-color 0.12s;
}
.chips:focus-within { border-color: var(--accent); }

.chip {
    display: flex; align-items: center; gap: 3px;
    background: var(--chip-bg); border: 1px solid var(--chip-border);
    border-radius: 3px; padding: 2px 7px; font-size: 11px;
}
.chip-x {
    cursor: pointer; color: var(--text-muted);
    font-size: 12px; line-height: 1;
    margin-left: 1px; padding: 0 1px;
}
.chip-x:hover { color: var(--danger); }

.chip-input {
    background: transparent; border: none;
    color: var(--text); font-size: 11px; font-family: inherit;
    min-width: 70px; max-width: 120px;
    outline: none; padding: 2px 4px;
}
.chip-input::placeholder { color: var(--text-muted); }

/* ── Sub-folders ────────────────────────────────── */
.subfolder-list { display: flex; flex-direction: column; gap: 8px; }

.subfolder-card {
    background: var(--bg-item);
    border: 1px solid var(--border); border-radius: 4px;
    padding: 10px 12px;
    display: flex; flex-direction: column; gap: 9px;
}
.subfolder-header { display: flex; align-items: center; gap: 8px; }
.subfolder-name-input { flex: 1; }

.btn {
    padding: 5px 13px; border-radius: 3px; border: none;
    cursor: pointer; font-size: 12px; font-family: inherit;
    transition: background 0.1s, color 0.1s;
}
.btn-primary { background: var(--accent); color: #fff; }
.btn-primary:hover { background: var(--accent-hover); }
.btn-ghost {
    background: transparent; color: var(--text-muted);
    border: 1px solid var(--border);
}
.btn-ghost:hover { background: var(--bg-hover); color: var(--text); }
.btn-danger-ghost {
    background: transparent; color: var(--danger);
    border: 1px solid rgba(231,76,60,0.4);
    padding: 4px 9px; font-size: 11px;
}
.btn-danger-ghost:hover { background: rgba(231,76,60,0.1); }

.add-subfolder-btn {
    display: inline-flex; align-items: center; gap: 5px;
    color: var(--accent); cursor: pointer; font-size: 12px;
    padding: 3px 0; margin-top: 2px;
}
.add-subfolder-btn:hover { opacity: 0.8; }

/* ── Empty state ────────────────────────────────── */
.empty-state {
    color: var(--text-muted); text-align: center;
    padding: 60px 24px; font-size: 13px; line-height: 1.6;
}

/* ── Footer ─────────────────────────────────────── */
.footer {
    display: flex; align-items: center; justify-content: space-between;
    padding: 10px 16px;
    border-top: 1px solid var(--border);
    background: var(--bg-panel); flex-shrink: 0;
}
.footer-link {
    display: inline-flex; align-items: center; gap: 5px;
    color: var(--text-muted); font-size: 11px;
    cursor: pointer; text-decoration: none;
    transition: color 0.12s;
}
.footer-link:hover { color: var(--accent); }
.footer-actions { display: flex; gap: 8px; }

/* ── Scrollbar ──────────────────────────────────── */
::-webkit-scrollbar { width: 5px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: #404040; border-radius: 3px; }

iconify-icon { display: inline-flex; vertical-align: middle; }

/* ── Update notification ────────────────────────────── */
#update-notification { flex-shrink: 0; }
.update-banner {
    display: flex; align-items: center; justify-content: space-between;
    gap: 12px;
    padding: 9px 16px;
    background: rgba(45,140,235,0.1);
    border-top: 1px solid rgba(45,140,235,0.3);
    font-size: 11px; color: var(--text);
}
.update-banner-text { display: flex; align-items: center; gap: 7px; }
.update-banner-label { color: var(--accent); font-weight: 600; }
.btn-update {
    background: var(--accent); color: #fff;
    border: none; border-radius: 3px;
    padding: 4px 11px; font-size: 11px;
    font-family: inherit; cursor: pointer; flex-shrink: 0;
    transition: background 0.1s;
}
.btn-update:hover { background: var(--accent-hover); }
</style>
</head>
<body>

<div class="layout">
    <div class="tabs">
        <div class="tab active" data-app="premiere" onclick="switchApp('premiere')">Premiere Pro</div>
        <div class="tab" data-app="aftereffects" onclick="switchApp('aftereffects')">After Effects</div>
    </div>

    <div class="body">
        <div class="sidebar">
            <div class="sidebar-list" id="sidebarList"></div>
            <div class="sidebar-add" onclick="addCategory()" title="Add folder">
                <iconify-icon icon="material-symbols-light:add-rounded" style="font-size:16px"></iconify-icon>
                Add folder
            </div>
        </div>
        <div class="detail" id="detail">
            <div class="empty-state">Select a category from the list</div>
        </div>
    </div>

    <div id="update-notification"></div>
    <div class="footer">
        <a class="footer-link" onclick="openSource()">
            <iconify-icon icon="material-symbols-light:code-rounded" style="font-size:14px"></iconify-icon>
            Source Code
        </a>
        <div class="footer-actions">
            <button class="btn btn-ghost" onclick="cancelSettings()">Cancel</button>
            <button class="btn btn-primary" onclick="saveSettings()">Save</button>
        </div>
    </div>
</div>

<script src="js/CSInterface.js"></script>
<script src="https://code.iconify.design/iconify-icon/2.1.0/iconify-icon.min.js"></script>
<script>
'use strict';

var csInterface = new CSInterface();
var SOURCE_URL = "https://github.com/FareEditor/FolderSorter";
var UPDATE_URL = "https://github.com/FareEditor/FolderSorter/releases/latest"

// ── Default settings ─────────────────────────────────────────────────────────

var DEFAULTS = {
    premiere: {
        categories: [
            { folder: "Images",       extensions: ["jpg","jpeg","png","gif","tiff","psd","ai"],          children: [] },
            { folder: "Video",        extensions: ["mp4","mov","avi","mxf","r3d","mts","braw"],          children: [] },
            { folder: "Audio",        extensions: ["mp3","wav","aif","wma","aac"],                       children: [] },
            { folder: "Data",         extensions: ["xml","csv","srt"],                                   children: [] },
            { folder: "Dynamic Link", extensions: ["aep","prproj","plb"],                                children: [] }
        ],
        templates: {
            folder: "Templates",
            sources: ["Atom","Premiere Composer Files","Motion Graphics Template Media",
                      "Motion Bro","AEJuice","Files From AEJuice",
                      "Envato","Motion Array","Storyblocks","AA_POWER"]
        }
    },
    aftereffects: {
        categories: [
            { folder: "Images",       extensions: ["jpeg","jpg","png","tiff","tif","psd","exr","tga","webp","bmp"], children: [] },
            { folder: "Video Files",  extensions: ["mov","mp4","mxf","avi","webm","mkv","flv","r3d","braw","mts"],  children: [] },
            { folder: "Vector Files", extensions: ["ai","eps","pdf","svg"],                                         children: [] },
            { folder: "Audio Files",  extensions: ["wav","mp3","aac","m4a","wma","aiff"],                          children: [] },
            { folder: "3D Models",    extensions: ["glb","gltf","sbsar","obj","fbx","c4d"],                         children: [] },
            { folder: "Dynamic Link", extensions: ["aep","aepx","prproj"],                                          children: [] }
        ],
        templates: {
            folder: "Templates",
            sources: ["AC Precomps","Motion Bro","AEJuice","Files From AEJuice",
                      "Envato","Motion Array","Storyblocks","AA_POWER"]
        }
    }
};

// ── State ─────────────────────────────────────────────────────────────────────

var state       = null;
var currentApp  = 'premiere';
var selection   = { type: 'category', index: 0 }; // type: 'category' | 'templates'

// ── File I/O ──────────────────────────────────────────────────────────────────

function getSettingsPath() {
    return csInterface.getSystemPath(SystemPath.EXTENSION) + "/settings.json";
}

function loadSettings() {
    try {
        var result = window.cep.fs.readFile(getSettingsPath(), "UTF-8");
        if (result.err === 0) {
            var parsed = JSON.parse(result.data);
            // Ensure children arrays exist (backwards compat)
            ['premiere', 'aftereffects'].forEach(function(app) {
                if (parsed[app] && parsed[app].categories) {
                    parsed[app].categories.forEach(function(cat) {
                        if (!cat.children) cat.children = [];
                    });
                }
            });
            state = parsed;
            return;
        }
    } catch(e) {}
    state = JSON.parse(JSON.stringify(DEFAULTS));
}

function saveSettings() {
    flushDetail();
    var json = JSON.stringify(state, null, 2);
    var result = window.cep.fs.writeFile(getSettingsPath(), json, "UTF-8");
    if (result.err !== 0) {
        alert("Could not write settings.json — check extension folder permissions.");
        return;
    }
    csInterface.closeExtension();
}

// ── UI helpers ────────────────────────────────────────────────────────────────

function openSource() { csInterface.openURLInDefaultBrowser(SOURCE_URL); }
function cancelSettings() { csInterface.closeExtension(); }

function switchApp(app) {
    flushDetail();
    currentApp = app;
    selection = { type: 'category', index: 0 };
    document.querySelectorAll('.tab').forEach(function(t) {
        t.classList.toggle('active', t.dataset.app === app);
    });
    render();
}

// ── Flush: read form → state before any re-render ────────────────────────────

function flushDetail() {
    var nameEl = document.getElementById('folderNameInput');
    if (!nameEl) return;
    var val = nameEl.value.trim();
    if (!val) return;

    if (selection.type === 'templates') {
        state[currentApp].templates.folder = val;
    } else {
        var cat = state[currentApp].categories[selection.index];
        if (cat) cat.folder = val;
    }
}

// ── Category operations ───────────────────────────────────────────────────────

function addCategory() {
    flushDetail();
    state[currentApp].categories.push({ folder: "New Folder", extensions: [], children: [] });
    selection = { type: 'category', index: state[currentApp].categories.length - 1 };
    render();
    // auto-focus name field
    var el = document.getElementById('folderNameInput');
    if (el) { el.focus(); el.select(); }
}

function deleteCategory(idx) {
    flushDetail();
    state[currentApp].categories.splice(idx, 1);
    if (selection.type === 'category') {
        var len = state[currentApp].categories.length;
        if (len === 0) {
            selection = { type: 'templates' };
        } else {
            selection.index = Math.min(selection.index, len - 1);
        }
    }
    render();
}

function selectCategory(idx) {
    flushDetail();
    selection = { type: 'category', index: idx };
    render();
}

function selectTemplates() {
    flushDetail();
    selection = { type: 'templates' };
    render();
}

// ── Extension chip operations ─────────────────────────────────────────────────

function addExtension(catIdx, value) {
    var ext = value.trim().replace(/^\./, '').toLowerCase();
    if (!ext) return;
    var cat = state[currentApp].categories[catIdx];
    if (cat.extensions.indexOf(ext) === -1) {
        cat.extensions.push(ext);
        renderDetail();
        focusChipInput('extInput_' + catIdx);
    }
}

function removeExtension(catIdx, extIdx) {
    state[currentApp].categories[catIdx].extensions.splice(extIdx, 1);
    renderDetail();
}

// ── Sub-folder operations ─────────────────────────────────────────────────────

function addSubfolder(catIdx) {
    state[currentApp].categories[catIdx].children.push({ folder: "Sub-folder", extensions: [] });
    renderDetail();
}

function removeSubfolder(catIdx, childIdx) {
    state[currentApp].categories[catIdx].children.splice(childIdx, 1);
    renderDetail();
}

function updateSubfolderName(catIdx, childIdx, value) {
    state[currentApp].categories[catIdx].children[childIdx].folder = value;
}

function addSubfolderExt(catIdx, childIdx, value) {
    var ext = value.trim().replace(/^\./, '').toLowerCase();
    if (!ext) return;
    var child = state[currentApp].categories[catIdx].children[childIdx];
    if (child.extensions.indexOf(ext) === -1) {
        child.extensions.push(ext);
        renderDetail();
        focusChipInput('subExtInput_' + catIdx + '_' + childIdx);
    }
}

function removeSubfolderExt(catIdx, childIdx, extIdx) {
    state[currentApp].categories[catIdx].children[childIdx].extensions.splice(extIdx, 1);
    renderDetail();
}

// ── Template source operations ────────────────────────────────────────────────

function addSource(value) {
    var src = value.trim();
    if (!src) return;
    var sources = state[currentApp].templates.sources;
    if (sources.indexOf(src) === -1) {
        sources.push(src);
        renderDetail();
        focusChipInput('sourceInput');
    }
}

function removeSource(idx) {
    state[currentApp].templates.sources.splice(idx, 1);
    renderDetail();
}

// ── Focus helper ──────────────────────────────────────────────────────────────

function focusChipInput(id) {
    var el = document.getElementById(id);
    if (el) { el.value = ''; el.focus(); }
}

// ── Render ────────────────────────────────────────────────────────────────────

function render() {
    renderSidebar();
    renderDetail();
}

function renderSidebar() {
    var appData = state[currentApp];
    var html = '';

    appData.categories.forEach(function(cat, i) {
        var active = (selection.type === 'category' && selection.index === i);
        html += '<div class="sidebar-item' + (active ? ' active' : '') + '" onclick="selectCategory(' + i + ')">';
        html += '<iconify-icon class="sidebar-item-icon" icon="material-symbols-light:folder-rounded"></iconify-icon>';
        html += '<span class="sidebar-item-name">' + h(cat.folder) + '</span>';
        html += '<span class="sidebar-item-del" onclick="event.stopPropagation();deleteCategory(' + i + ')" title="Delete folder">✕</span>';
        html += '</div>';
    });

    html += '<div class="sidebar-divider"></div>';

    var tActive = (selection.type === 'templates');
    html += '<div class="sidebar-item templates-row' + (tActive ? ' active' : '') + '" onclick="selectTemplates()">';
    html += '<iconify-icon class="sidebar-item-icon" icon="material-symbols-light:photo-library-rounded"></iconify-icon>';
    html += '<span class="sidebar-item-name">' + h(appData.templates.folder) + '</span>';
    html += '</div>';

    document.getElementById('sidebarList').innerHTML = html;
}

function renderDetail() {
    var appData = state[currentApp];
    var detail  = document.getElementById('detail');

    if (selection.type === 'templates') {
        detail.innerHTML = buildTemplatesDetail(appData.templates);
    } else {
        var cat = appData.categories[selection.index];
        if (cat) {
            detail.innerHTML = buildCategoryDetail(cat, selection.index);
        } else {
            detail.innerHTML = '<div class="empty-state">Select a category or add a new one</div>';
        }
    }
}

// ── Templates detail ──────────────────────────────────────────────────────────

function buildTemplatesDetail(tpl) {
    var s = '';
    s += '<div class="field-group">';
    s += '<div class="field-label">Folder Name</div>';
    s += '<input class="field-input" id="folderNameInput" type="text" value="' + a(tpl.folder) + '" />';
    s += '</div>';

    s += '<div class="field-group">';
    s += '<div class="field-label">Template Plugin Sources</div>';
    s += '<div class="chips">';
    tpl.sources.forEach(function(src, i) {
        s += '<div class="chip"><span>' + h(src) + '</span>';
        s += '<span class="chip-x" onclick="removeSource(' + i + ')">✕</span></div>';
    });
    s += '<input class="chip-input" id="sourceInput" placeholder="Plugin folder name…"';
    s += ' onkeydown="if(event.key===\'Enter\'||event.key===\',\'){event.preventDefault();addSource(this.value);}" />';
    s += '</div>';
    s += '<div style="color:var(--text-muted);font-size:11px;margin-top:4px;">Press Enter or comma to add. These are root-level folder names that will be merged into Templates.</div>';
    s += '</div>';
    return s;
}

// ── Category detail ───────────────────────────────────────────────────────────

function buildCategoryDetail(cat, catIdx) {
    var s = '';

    // Folder name
    s += '<div class="field-group">';
    s += '<div class="field-label">Folder Name</div>';
    s += '<input class="field-input" id="folderNameInput" type="text" value="' + a(cat.folder) + '" />';
    s += '</div>';

    // Extensions
    s += '<div class="field-group">';
    s += '<div class="field-label">File Extensions</div>';
    s += '<div class="chips">';
    cat.extensions.forEach(function(ext, i) {
        s += '<div class="chip"><span>.' + h(ext) + '</span>';
        s += '<span class="chip-x" onclick="removeExtension(' + catIdx + ',' + i + ')">✕</span></div>';
    });
    s += '<input class="chip-input" id="extInput_' + catIdx + '" placeholder="ext…"';
    s += ' onkeydown="if(event.key===\'Enter\'||event.key===\',\'){event.preventDefault();addExtension(' + catIdx + ',this.value);}" />';
    s += '</div>';
    s += '</div>';

    // Sub-folders
    s += '<div class="field-group">';
    s += '<div class="field-label">Sub-folders</div>';
    s += '<div class="subfolder-list">';

    cat.children.forEach(function(child, ci) {
        s += '<div class="subfolder-card">';
        s += '<div class="subfolder-header">';
        s += '<input class="field-input subfolder-name-input" type="text" value="' + a(child.folder) + '" placeholder="Sub-folder name"';
        s += ' onchange="updateSubfolderName(' + catIdx + ',' + ci + ',this.value)" />';
        s += '<button class="btn btn-danger-ghost" onclick="removeSubfolder(' + catIdx + ',' + ci + ')">Remove</button>';
        s += '</div>';
        s += '<div class="chips">';
        child.extensions.forEach(function(ext, ei) {
            s += '<div class="chip"><span>.' + h(ext) + '</span>';
            s += '<span class="chip-x" onclick="removeSubfolderExt(' + catIdx + ',' + ci + ',' + ei + ')">✕</span></div>';
        });
        s += '<input class="chip-input" id="subExtInput_' + catIdx + '_' + ci + '" placeholder="ext…"';
        s += ' onkeydown="if(event.key===\'Enter\'||event.key===\',\'){event.preventDefault();addSubfolderExt(' + catIdx + ',' + ci + ',this.value);}" />';
        s += '</div>';
        s += '</div>';
    });

    s += '</div>';
    s += '<div class="add-subfolder-btn" onclick="addSubfolder(' + catIdx + ')">';
    s += '<iconify-icon icon="material-symbols-light:add-rounded" style="font-size:15px"></iconify-icon> Add sub-folder';
    s += '</div>';
    s += '</div>';

    return s;
}

// ── Escape helpers ────────────────────────────────────────────────────────────

function h(str) {
    return String(str)
        .replace(/&/g,'&amp;').replace(/</g,'&lt;')
        .replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
function a(str) {
    return String(str).replace(/&/g,'&amp;').replace(/"/g,'&quot;');
}

// ── Update check ──────────────────────────────────────────────────────────────

function checkForUpdates() {
    var currentVersion = "1.0";
    fetch('https://api.github.com/repos/FareEditor/FolderSorter/releases/latest', {
        headers: { 'User-Agent': 'Adobe-CEP-Extension' }
    })
    .then(function(res) { return res.json(); })
    .then(function(data) {
        var tag = (data.tag_name || '').replace(/^v/i, '');
        if (!tag) return;
        if (isNewerVersion(currentVersion, tag)) renderUpdateBanner(tag, data.html_url);
    })
    .catch(function(err) {
        console.error('Folder Sorter: update check failed —', err);
    });
}

function isNewerVersion(current, latest) {
    var c = current.split('.').map(Number);
    var l = latest.split('.').map(Number);
    var len = Math.max(c.length, l.length);
    for (var i = 0; i < len; i++) {
        var cv = c[i] || 0;
        var lv = l[i] || 0;
        if (lv > cv) return true;
        if (lv < cv) return false;
    }
    return false;
}

function renderUpdateBanner(version, url) {
    var el = document.getElementById('update-notification');
    if (!el) return;

    el.innerHTML =
        '<div class="update-banner">' +
            '<div class="update-banner-text">' +
                '<iconify-icon icon="material-symbols-light:new-releases-rounded" style="font-size:16px;color:var(--accent)"></iconify-icon>' +
                '<span><span class="update-banner-label">v' + h(version) + ' available</span> — a new version of Folder Sorter is out.</span>' +
            '</div>' +
            '<button class="btn-update" id="btnDownloadUpdate">Download Update</button>' +
        '</div>';

    var btn = document.getElementById('btnDownloadUpdate');
    if (btn) {
        btn.addEventListener('click', function() {
            if (window.cep) {
                csInterface.openURLInDefaultBrowser(url);
            } else {
                window.open(url, '_blank');
            }
        });
    }
}
